[workspace]
authors = ["Tim Treis <tim.treis@helmholtz-munich.de>"]
channels = ["conda-forge"]
name = "2023_Arevalo_BatchCorrection"
platforms = ["linux-64"]
version = "0.1.0"

[activation]
# Ensure pixi's own libstdc++ is found before system/miniconda versions,
# which may lack CXXABI_1.3.15 required by Python 3.13 native extensions.
env = { LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" }

[dependencies]
python = "3.13.*"
conda = "*"

[pypi-dependencies]
snakemake = ">=8,<9"
snakemake-software-deployment-plugin-conda = "*"
anndata = "*"
scanpy = ">=1.11.4,<2"
pyarrow = "*"
scib-metrics = "*"
optuna = "*"
scikit-learn = "*"
copairs = "*"
tqdm = "*"
statsmodels = "*"
scipy = "*"
pycytominer = "*"
matplotlib = "*"
plotly = "*"
seaborn = "*"

[tasks]
build-base = "[ containers/base.sif -nt containers/base.def ] && echo 'base.sif is up to date' || apptainer build --force containers/base.sif containers/base.def"
build-scvi = { cmd = "[ containers/scvi.sif -nt containers/scvi.def ] && [ containers/scvi.sif -nt containers/base.def ] && echo 'scvi.sif is up to date' || apptainer build --force containers/scvi.sif containers/scvi.def", depends-on = ["build-base"] }
build-scibmetrics = { cmd = "[ containers/scibmetrics.sif -nt containers/scibmetrics.def ] && [ containers/scibmetrics.sif -nt containers/base.def ] && echo 'scibmetrics.sif is up to date' || apptainer build --force containers/scibmetrics.sif containers/scibmetrics.def", depends-on = ["build-base"] }
build-lightweight = { cmd = "[ containers/lightweight.sif -nt containers/lightweight.def ] && [ containers/lightweight.sif -nt containers/base.def ] && echo 'lightweight.sif is up to date' || apptainer build --force containers/lightweight.sif containers/lightweight.def", depends-on = ["build-base"] }
build-scpoli = "[ containers/scpoli.sif -nt containers/scpoli.def ] && echo 'scpoli.sif is up to date' || apptainer build --force containers/scpoli.sif containers/scpoli.def"
build-desc = { cmd = "[ containers/desc.sif -nt containers/desc.def ] && [ containers/desc.sif -nt containers/base.def ] && echo 'desc.sif is up to date' || apptainer build --force containers/desc.sif containers/desc.def", depends-on = ["build-base"] }
build-r-v4 = "[ containers/r_v4.sif -nt containers/r_v4.def ] && echo 'r_v4.sif is up to date' || apptainer build --force containers/r_v4.sif containers/r_v4.def"
build-r-v5 = "[ containers/r_v5.sif -nt containers/r_v5.def ] && echo 'r_v5.sif is up to date' || apptainer build --force containers/r_v5.sif containers/r_v5.def"
build-harmony-v1 = { cmd = "[ containers/harmony_v1.sif -nt containers/harmony_v1.def ] && [ containers/harmony_v1.sif -nt containers/base.def ] && echo 'harmony_v1.sif is up to date' || apptainer build --force containers/harmony_v1.sif containers/harmony_v1.def", depends-on = ["build-base"] }
build-scibmetrics-gpu = { cmd = "[ containers/scibmetrics-gpu.sif -nt containers/scibmetrics-gpu.def ] && [ containers/scibmetrics-gpu.sif -nt containers/base.def ] && echo 'scibmetrics-gpu.sif is up to date' || apptainer build --force containers/scibmetrics-gpu.sif containers/scibmetrics-gpu.def", depends-on = ["build-base"] }
build-containers = { depends-on = ["build-scvi", "build-scibmetrics", "build-scibmetrics-gpu", "build-lightweight", "build-harmony-v1", "build-scpoli", "build-desc", "build-r-v4", "build-r-v5"] }

# Shared snakemake args (shared.json is loaded first, scenario config overrides)
# Usage: pixi run scenario-1  (or scenario-2, ..., scenario-7)
scenario-1 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_1.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=4 --keep-going"
scenario-2 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_2.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=4 --keep-going"
scenario-3 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_3.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=4 --keep-going"
scenario-4 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_4.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=4 --keep-going"
scenario-5 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_5.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=4 --keep-going"
scenario-wave1 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_wave1.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=1 --keep-going"
scenario-wave2 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_wave2.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=1 --keep-going"
scenario-7 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_7.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=4 --keep-going"

unlock-1 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_1.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=2 --unlock"
unlock-2 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_2.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=2 --unlock"
unlock-3 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_3.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=2 --unlock"
unlock-4 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_4.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=2 --unlock"
unlock-5 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_5.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=2 --unlock"
unlock-7 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_7.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=2 --unlock"

scenario-8 = "MEM_MB=$(python -c \"import os; pn=os.environ.get('SLURM_MEM_PER_NODE',''); pc=os.environ.get('SLURM_MEM_PER_CPU',''); nc=os.environ.get('SLURM_CPUS_ON_NODE',''); print(int(pn) if pn else int(pc)*int(nc) if pc and nc else 256000)\") && PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/scenario_8.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=4 mem_mb=$MEM_MB --keep-going"
scenario-8-defaults = "MEM_MB=$(python -c \"import os; pn=os.environ.get('SLURM_MEM_PER_NODE',''); pc=os.environ.get('SLURM_MEM_PER_CPU',''); nc=os.environ.get('SLURM_CPUS_ON_NODE',''); print(int(pn) if pn else int(pc)*int(nc) if pc and nc else 256000)\") && PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/scenario_8_defaults.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=4 mem_mb=$MEM_MB --keep-going"
scenario-1-defaults = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_1_defaults.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=1 --keep-going"
scenario-2-defaults = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_2_defaults.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=1 --keep-going"
scenario-3-defaults = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/shared.json inputs/conf/scenario_3_defaults.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=1 --keep-going"

unlock-8 = "PATH=$(dirname $(which python)):$PATH snakemake -c20 --configfile inputs/conf/scenario_8.json --sdm apptainer --apptainer-args=--nv --resources nvidia_gpu=8 --unlock"
